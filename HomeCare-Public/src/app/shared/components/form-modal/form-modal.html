<div class="p-4">

  <div class="d-flex justify-content-between align-items-center">
    <h6 class="fs-5 fw-bold pb-1">{{ modalData.title }}</h6>
    <button (click)="onCancelClick()" class="border-0 pb-1 bg-transparent text-light-custom">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  @if(modalData.subtitle){
  <div class="subtitle-1 body-2 pt-1 pb-2">
    {{modalData.subtitle}}
  </div>
  }

  <form [formGroup]="form">

    <mat-dialog-content class="p-0 pt-2 overflow-auto">

      @for (field of modalData.fields; track field.name) {
      <app-input-component [label]="field.label" [type]="field.type === 'otp' ? 'text' : field.type" [icon]="field.icon"
        [control]="getControl(field.name)" [options]="getOptions(field.name)"
        [errorMessage]="field.type === 'otp' ? 'Please enter a valid 4-digit OTP' : undefined" [maxLength]="field.maxLength">
      </app-input-component>
      }

    </mat-dialog-content>

    <div class="w-100 m-0 mt-4">
      <div class="pe-0">
        <button type="button" class="final-btn w-100 btn-primary-custom py-3 fw-bold fs-14" (click)="onSaveClick()"
          [disabled]="isLoading">
          @if (isLoading) {
          <span class="spinner-border spinner-border-sm me-2" role="status"></span>
          }
          {{ isLoading ? loadingLabel : (modalData.submitLabel ?? 'Save') }}
        </button>
      </div>

    </div>

  </form>

</div>
