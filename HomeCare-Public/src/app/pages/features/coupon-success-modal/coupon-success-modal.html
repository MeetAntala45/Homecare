<div class="position-relative text-center p-4 modal-wrapper">

  <button class="btn-close position-absolute top-0 end-0 m-3" (click)="close()">
  </button>

  <div class="d-flex justify-content-center mb-3 mt-1">
    <div class="rounded-circle d-flex align-items-center justify-content-center"
      >
      <img src="assets/images/offers.png" width="42" height="42" alt="success">
    </div>
  </div>

  <h5 class="fw-semibold mb-2">
    You saved ${{ data.discountAmount }}
  </h5>

  <span class="badge mb-2 px-3 py-2">
    {{ data.couponCode }} applied successfully
  </span>

  <div class="text-muted small mb-3">
    Discount has been applied to your cart
  </div>

  <div class="text-center fw-bold yayText mb-3">
    Yay!
  </div>

  <div class="progress" style="height:6px">
    <div class="progress-bar" role="progressbar" [style.width.%]="progress">
    </div>
  </div>

</div>
