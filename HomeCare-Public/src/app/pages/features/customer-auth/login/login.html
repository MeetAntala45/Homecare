<div class="d-flex align-items-center justify-content-center min-vh-100 px-3">
  <div class="login-box w-100">
    <div class="text-center mb-5">
      <a class="text-decoration-none text-dark-custom" routerLink="customer/home"
        ><span class="h4 fw-bold">H<span class="text-primary-300">o</span>meCare</span></a
      >
    </div>

    <h3 class="text-center mb-4 pb-3 text-light-custom">Sign in to continue</h3>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="d-flex flex-column gap-2">
        <app-input-component label="Name" type="text" [control]="nameControl">
        </app-input-component>

        <app-input-component label="Email" type="email" icon="mail" [control]="emailControl">
        </app-input-component>
      </div>

      <div class="mt-3">
        <button
          type="submit"
          class="btn-primary-custom w-100 py-3 rounded-5"
          [disabled]="isSubmitting"
        >
          @if(isSubmitting){
          <span class="spinner-border spinner-border-sm me-2" role="status"></span>
          }
          {{ isSubmitting ? 'Sending OTP...' : 'Get OTP' }}
        </button>
      </div>
    </form>

    <div class="p-2 mt-3">
      <div class="text-center text-light-custom fw-medium">
        By clicking on Sign In, I accept the
        <span class="text-primary-300 fw-bolder">Terms & Condition</span>
        & <span class="text-primary-300 fw-bolder">Privacy Policy</span>
      </div>
      <div class="or-divider my-4 d-flex align-items-center">
        <span class="fw-medium px-2 text-light-custom fs-14 fw-medium">OR</span>
      </div>
      <div class="text-center">
        <div class="text-light-custom mb-2 fw-bold">Are You a Service Partner?</div>
        <div>
          <a routerLink="/customer/service-partner/onboarding" class="text-primary-300 fw-bolder"
            >Join Now</a
          >
        </div>
      </div>
    </div>
  </div>
</div>
