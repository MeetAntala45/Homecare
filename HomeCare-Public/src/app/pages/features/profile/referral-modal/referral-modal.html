<!-- Backdrop -->
<div class="share-backdrop" (click)="onClose()"></div>

<!-- Modal -->
<div class="share-modal" role="dialog" aria-modal="true">
  <div class="share-modal__header">
    <h5 class="share-modal__title"><i class="bi bi-share me-2"></i>Invite a Friend</h5>
    <button class="share-modal__close" (click)="onClose()" aria-label="Close">
      <svg
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.5"
      >
        <line x1="18" y1="6" x2="6" y2="18" />
        <line x1="6" y1="6" x2="18" y2="18" />
      </svg>
    </button>
  </div>

  <div class="share-modal__body">
    <p class="share-modal__desc">
      Enter your friend's email. They'll receive your referral code
      <strong>{{ referralCode }}</strong> and get <strong>50% off </strong> on their first booking.
    </p>

    <div class="share-input-group">
      <label class="share-label">Friend's Email Address</label>
      <input
        type="email"
        class="share-input"
        [(ngModel)]="recipientEmail"
        placeholder="friend@example.com"
        [class.share-input--error]="emailError"
        (input)="emailError = ''"
      />
      @if (emailError) {
      <span class="share-error">{{ emailError }}</span>
      }
    </div>
  </div>

  <div class="share-modal__footer">
    <button class="share-btn-cancel" (click)="onClose()">Cancel</button>
    <button class="share-btn-send" [disabled]="isSending" (click)="onSend()">
      @if (isSending) {
      <span class="share-spinner"></span> Sending… } @else { <i class="bi bi-send me-1"></i>Send
      Invite }
    </button>
  </div>
</div>
