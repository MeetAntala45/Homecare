<div class="hc-backdrop d-md-none" [class.active]="isOpen" (click)="closeChat()"></div>

<div
  class="hc-chat-window shadow-lg"
  [class.open]="isOpen"
  role="dialog"
  aria-label="HomeCare Support Chat"
  aria-modal="true"
>
  <div class="hc-header d-flex align-items-center justify-content-between px-3 py-2">
    <div class="d-flex align-items-center gap-2">
      <div class="hc-avatar position-relative flex-shrink-0">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path
            d="M12 2C6.48 2 2 6.48 2 12C2 13.85 2.51 15.58 3.4 17.06L2 22L7.11 20.63C8.54 21.49 10.21 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2Z"
            fill="rgba(255,255,255,0.92)"
          />
        </svg>
        <span class="hc-online-dot position-absolute"></span>
      </div>
      <div class="d-flex flex-column">
        <span class="hc-header-name">HomeCare Assistant</span>
      </div>
    </div>

    <div class="d-flex align-items-center gap-1">
      <button
        class="hc-icon-btn btn p-0 d-flex align-items-center justify-content-center"
        (click)="clearChat()"
        title="Clear chat"
        aria-label="Clear chat"
      >
        <svg
          width="15"
          height="15"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="1 4 1 10 7 10" />
          <path d="M3.51 15a9 9 0 1 0 .49-3.51" />
        </svg>
      </button>
      <button
        class="hc-icon-btn btn p-0 d-flex align-items-center justify-content-center"
        (click)="closeChat()"
        title="Close"
        aria-label="Close chat"
      >
        <svg
          width="15"
          height="15"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
        >
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>
  </div>

  <div class="hc-messages flex-grow-1 px-3 py-3" #messagesContainer>
    @for (msg of messages; track $index) { @if (msg.role === 'bot') {
    <div class="d-flex align-items-end gap-2 mb-3">
      <div class="d-flex flex-column">
        <div class="hc-bubble hc-bubble-bot" [class.hc-typing-bubble]="msg.isTyping">
          @if (!msg.isTyping) {
          {{ msg.text }}
          } @else {
          <span class="hc-dot"></span>
          <span class="hc-dot"></span>
          <span class="hc-dot"></span>
          }
        </div>
        @if (!msg.isTyping) {
        <span class="hc-time ms-1">{{ msg.time }}</span>
        }
      </div>
    </div>
    } @if (msg.role === 'user') {
    <div class="d-flex flex-row-reverse align-items-end mb-3">
      <div class="d-flex flex-column align-items-end" style="max-width: 82%">
        <div class="hc-bubble hc-bubble-user">{{ msg.text }}</div>
        <span class="hc-time me-1">{{ msg.time }}</span>
      </div>
    </div>
    } }
  </div>

  <div class="hc-input-area px-3 py-2 border-top">
    <div class="hc-input-wrapper d-flex align-items-center gap-2">
      <input
        #inputRef
        class="hc-input form-control border-0 bg-transparent shadow-none"
        type="text"
        [(ngModel)]="userInput"
        (keydown)="onKeyDown($event)"
        placeholder="Ask me anything..."
        [disabled]="isLoading"
        maxlength="500"
        autocomplete="off"
        aria-label="Type your message"
      />
      <button
        class="hc-send-btn btn d-flex align-items-center justify-content-center flex-shrink-0"
        (click)="sendMessage()"
        [disabled]="!userInput.trim() || isLoading"
        aria-label="Send message"
      >
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
          <path
            d="M22 2L11 13"
            stroke="white"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path
            d="M22 2L15 22L11 13L2 9L22 2Z"
            stroke="white"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </button>
    </div>
    <p class="hc-hint text-center mb-0 mt-1">HomeCare Support</p>
  </div>
</div>

<button
  class="hc-fab btn d-flex align-items-center justify-content-center position-fixed"
  (click)="toggleChat()"
  [class.open]="isOpen"
  aria-label="Toggle support chat"
  title="HomeCare Support"
>
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
    <path
      d="M21 15C21 15.53 20.79 16.04 20.41 16.41C20.04 16.79 19.53 17 19 17H7L3 21V5C3 4.47 3.21 3.96 3.59 3.59C3.96 3.21 4.47 3 5 3H19C19.53 3 20.04 3.21 20.41 3.59C20.79 3.96 21 4.47 21 5V15Z"
      stroke="white"
      stroke-width="2.2"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </svg>
  @if (!isOpen) {
  <span class="hc-badge position-absolute"></span>
  }
</button>
