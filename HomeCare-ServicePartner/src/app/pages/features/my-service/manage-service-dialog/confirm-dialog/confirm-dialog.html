<div class="p-4">
  <div class="d-flex justify-content-between align-items-center mb-2">
    <h6 class="p-0 fw-bold">Remove Confirmation</h6>
    <button class="text-light-custom border-0 bg-transparent" (click)="onCancel()">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <p class="text-muted mb-4 fs-14" [innerHTML]="data.message"></p>

  <div class="row w-100 m-0 mt-1">
    <div class="col-6 ps-0">
      <button
        type="button"
        class="w-100 btn-secondary-custom py-3 fs-14 fw-bold rounded-3"
        (click)="onCancel()"
      >
        Cancel
      </button>
    </div>
    <div class="col-6 pe-0">
      <button
        type="button"
        class="w-100 btn-primary-custom py-3 fs-14 fw-bold rounded-3"
        (click)="onConfirm()"
      >
        Save
      </button>
    </div>
  </div>
</div>
