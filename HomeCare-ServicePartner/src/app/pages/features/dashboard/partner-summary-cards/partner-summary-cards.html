<div class="row g-3">
  @for (card of summaryCards; track card.label) {
  <div class="col-12 col-sm-6 col-xl-3">
    <div class="card shadow-sm border-0 p-4 d-flex justify-content-between summary-card">
      @if(loading) {
      <div class="d-flex justify-content-between align-items-start w-100">
        <div>
          <div class="skeleton skeleton-title mb-2"></div>
          <div class="skeleton skeleton-text mb-2"></div>
        </div>
        <div class="skeleton skeleton-circle"></div>
      </div>
      <div class="skeleton skeleton-badge mt-2"></div>
      } @else {
      <div class="d-flex justify-content-between align-items-start">
        <div>
          <h4
            class="fw-bold mb-1 fs-3"
            [matTooltip]="
              (card.isRevenue ? '$' : '') +
              (card.isRating ? card.value.toFixed(1) : card.value.toLocaleString()) +
              (card.isRating ? ' / 5' : '')
            "
            matTooltipPosition="below"
          >
            @if (card.isRevenue) { $ } @if (card.isRating) {
            {{ card.value | countFormat }} / 5 } @else {
            {{ card.value | countFormat }}
            }
          </h4>
          <small class="text-muted fw-semibold">{{ card.label }}</small>
        </div>
        <img [src]="card.icon" class="metric-image" alt="" />
      </div>
      <div class="d-flex align-items-center">
        <div class="mt-2 small-text fw-semibold text-muted">
          <span
            class="rounded-2 p-1 fw-semibold me-2"
            [ngClass]="card.change > 0 ? 'badge-active' : 'badge-inactive'"
          >
            {{ card.change > 0 ? '+' : '' }}{{ card.change }}%
          </span>
          Then Last Week
        </div>
      </div>
      }
    </div>
  </div>
  }
</div>
