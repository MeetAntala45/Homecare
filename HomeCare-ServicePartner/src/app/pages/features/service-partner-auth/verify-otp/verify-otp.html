<div class="d-flex align-items-center justify-content-center min-vh-100 px-3">
  <div class="login-box w-100">
    <div class="text-center">
      <a class="text-decoration-none text-dark-custom" routerLink="/customer/home">
        <span class="h4 fw-bold"> H<span class="text-primary-300">o</span>meCare </span>
      </a>

      <h3 class="mt-5 text-light-custom fw-bold">Enter OTP</h3>
      <p class="text-muted mb-4">
        We have sent you a code on
        <span class="fw-bolder text-lowercase">{{ email }}</span>
      </p>

      <div class="d-flex align-items-center justify-content-center mb-4 gap-2 flex-wrap">
        <div class="d-flex align-items-center">
          <div
            class="rounded-circle d-flex align-items-center justify-content-center fw-semibold text-white"
            style="width: 40px; height: 40px; background-color: #16a34a"
          >
            ✓
          </div>
          <span class="ms-2 fw-medium">Enter Email</span>
        </div>

        <div
          class="mx-2 d-none d-sm-block"
          style="width: 70px; height: 1px; background: #d1d5db"
        ></div>

        <div class="d-flex align-items-center">
          <div
            class="rounded-circle d-flex align-items-center justify-content-center fw-semibold text-white"
            style="width: 40px; height: 40px; background-color: #4f46e5"
          >
            2
          </div>
          <span class="ms-2 fw-medium">Verify OTP</span>
        </div>
      </div>

      <form [formGroup]="otpForm" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <app-input-component label="OTP" type="otp" [control]="otpControl"> </app-input-component>
        </div>

        <div class="d-flex flex-sm-row flex-column gap-3 mt-4">
          <button
            type="button"
            class="btn border w-100 py-3 fw-semibold rounded-pill text-primary-300 bg-light-custom"
            (click)="resendOtp()"
            [disabled]="isResending || resendCooldown > 0"
          >
            {{
              resendCooldown > 0
                ? 'Resend in ' + resendCooldown + 's'
                : isResending
                ? 'Sending...'
                : 'Resend OTP'
            }}
          </button>

          <button
            type="submit"
            class="btn w-100 py-3 fw-semibold text-white rounded-pill"
            style="background-color: #4f46e5"
            [disabled]="isSubmitting"
          >
            @if(isSubmitting){
            <span class="spinner-border spinner-border-sm me-2"></span>
            }
            {{ isSubmitting ? 'Verifying...' : 'Sign In' }}
          </button>
        </div>
      </form>

      <div class="p-2 mt-3">
        <div class="text-center text-light-custom fw-medium">
          By clicking on Sign In, I accept the
          <span class="text-primary-300 fw-bolder">Terms & Condition</span>
          &
          <span class="text-primary-300 fw-bolder">Privacy Policy</span>
        </div>
      </div>
    </div>
  </div>
</div>
