name: Deploy Homecare API

on:
  push:
    branches:
      - main
    paths:
      - 'HomeCareApi/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore HomeCareApi/Homecare.API/Homecare.API.csproj

      - name: Build
        run: dotnet build HomeCareApi/Homecare.API/Homecare.API.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish HomeCareApi/Homecare.API/Homecare.API.csproj --configuration Release --output ./publish

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'homecare-api'
          slot-name: 'production'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
