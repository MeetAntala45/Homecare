<div class="inner-grid-wrapper">
  <app-data-grid
  class="custom-grid"
  [columns]="columns"
  [data]="data"
  [isLoading]="isLoading"
  [skeletonRowCount]="pageSize"
  [showActions]="true"
  [sortBy]="sortBy"
  [sortOrder]="sortOrder"
  [highlightedRowId]="highlightedRowId"
  (sortChanged)="onSortChanged($event)"
  (actionClicked)="handleAction($event)"
  (expertDetailClicked)="onExpertDetailClicked($event)"
/>

<div class="pagination-bar ps-3 pe-3 pb-2">
  <div class="pagination-size">
    <span class="pagination-label">Rows per page:</span>
    <select
      class="pagination-select"
      [ngModel]="pageSize"
      (ngModelChange)="onPageSizeChange($event)"
    >
      @for(opt of pageSizeOptions; track opt) {
      <option [value]="opt">{{ opt }}</option>
      }
    </select>
  </div>
  <div class="pagination-controls">
    <span class="pagination-label">{{ rangeStart }}-{{ rangeEnd }} of {{ totalCount }}</span>
    <button class="page-btn" (click)="goToPrev()" [disabled]="isFirstPage">
      <i class="bi bi-chevron-left"></i>
    </button>
    <button class="page-btn" (click)="goToNext()" [disabled]="isLastPage">
      <i class="bi bi-chevron-right"></i>
    </button>
  </div>
</div>
</div>
