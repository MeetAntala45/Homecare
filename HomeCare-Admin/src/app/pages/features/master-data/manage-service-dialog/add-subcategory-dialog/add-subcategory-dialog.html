<div class="p-4">
  <div class="d-flex justify-content-between align-items-center">
    <h6 class="p-0 fw-bold">Add Sub Category</h6>
    <button (click)="onCancel()" class="text-light-custom border-0 bg-transparent">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <form [formGroup]="subCategoryfield">
    <mat-dialog-content class="p-0 pt-2 overflow-hidden">
      <div class="mb">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Sub Category</mat-label>
          <input matInput formControlName="SubCategory" class="rounded-3" />
          @if (subCategoryfield.get('name')?.invalid) {
          <mat-error> Service-Type is required </mat-error>
          }
        </mat-form-field>
      </div>
    </mat-dialog-content>

    <div class="row w-100 m-0 mt-1">
      <div class="col-6 ps-0">
        <button
          type="button"
          class="w-100 btn-secondary-custom py-3 fs-14 fw-bold rounded-3"
          (click)="onCancel()"
        >
          Cancel
        </button>
      </div>
      <div class="col-6 pe-0">
        <button
          type="button"
          class="w-100 btn-primary-custom py-3 fs-14 fw-bold rounded-3"
          (click)="onSave()"
        >
          Save
        </button>
      </div>
    </div>
  </form>
</div>
