<div class="forgot-box w-100">
  <div class="text-center mb-5">
    <span class="logo-text">H<span class="logo-o">o</span>meCare</span>
  </div>

  <h3 class="content text-center mb-4 fs-4 fw-400">Enter your registered mail to get reset link</h3>

  <form [formGroup]="adminForgotForm" (ngSubmit)="onSubmit()">
    <app-input-component
      label="Email"
      type="email"
      icon="mail"
      requiredMessage="Email is required"
      [control]="emailControl"
      class="mb-4"
    >
    </app-input-component>

    <button
      type="submit"
      class="btn-primary-custom w-100 py-3"
      [disabled]="adminForgotForm.invalid || isSubmitting"
    >
      {{ isSubmitting ? 'Sending...' : 'Send link' }}
    </button>
  </form>
</div>
