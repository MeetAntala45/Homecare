<app-grid-layout
    title="Customers"
    detailRoutePath="/admin/customer-users"
    [showFilter]="true"
    [currentFilters]="filter"
    [showAdd]="true"
    addButtonLabel="Add"
    [columns]="columns"
    [data]="data"
    [isLoading]="isLoading"
    [skeletonRowCount]="filter.pageSize"
    [showActions]="true"
    [showPagination]="true"
    [totalCount]="totalCount"
    [pageNumber]="filter.pageNumber"
    [pageSize]="filter.pageSize"
    [sortBy]="filter.sortBy"
    [sortOrder]="filter.sortOrder"
    (pageChanged)="onPageChanged($event)"
    (sortChanged)="onSortChanged($event)"
    (actionClicked)="handleAction($event)"
    (filterClicked)="openFilter()"
    (addClicked)="openCustomerModal()"
   >
</app-grid-layout>
